name: AllMusic Client

on:
  push:
    branches:
      - 'main'
      - 'releases/**'
    tags:
      - '*'
    paths:
      - 'client/**'
      - 'codec/**'
      - 'buildSrc/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradle/**'
      - '.github/workflows/client.yml'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [
          'fabric_26_1',
          'fabric_1_21_11',
          'fabric_1_21_6',
          'fabric_1_21',
          'fabric_1_20_1',
          'fabric_1_16_5',
          'neoforge_26_1',
          'neoforge_1_21_11',
          'neoforge_1_21_6',
          'neoforge_1_21',
          'forge_1_20_1',
          'forge_1_16_5'
        ]
    runs-on: windows-latest
    name: client ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'true'
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: build ${{ matrix.platform }}
        shell: cmd
        run: |
          gradlew :client:${{ matrix.platform }}:build
      - name: upload ${{ matrix.platform }}
        uses: actions/upload-artifact@v4
        with:
          name: client_${{ matrix.platform }}
          path: build/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, 'debug')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect jars
        run: |
          mkdir -p release_jars
          find artifacts -name "*.jar" -exec cp {} release_jars/ \;
      - name: Create Pre-release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          prerelease: true
          tag_name: ${{ github.ref_name }}
          name: "Pre-release ${{ github.ref_name }}"
          body: "自动构建的预发布版本"
          files: |
            release_jars/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
