name: AllMusic Client

on:
  push:
    branches: ['main', 'releases/**']
    tags: ['*']
    paths:
      - 'client/**'
      - 'codec/**'
      - 'buildSrc/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradle/**'
      - '.github/workflows/client.yml'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: 'fabric_26_1',    display: 'Fabric 26.1' }
          - { platform: 'fabric_1_21_11', display: 'Fabric 1.21.11' }
          - { platform: 'fabric_1_21_6',  display: 'Fabric 1.21.6' }
          - { platform: 'fabric_1_21',    display: 'Fabric 1.21' }
          - { platform: 'fabric_1_20_1',  display: 'Fabric 1.20.1' }
          - { platform: 'fabric_1_16_5',  display: 'Fabric 1.16.5' }
          - { platform: 'neoforge_26_1',    display: 'NeoForge 26.1' }
          - { platform: 'neoforge_1_21_11', display: 'NeoForge 1.21.11' }
          - { platform: 'neoforge_1_21_6',  display: 'NeoForge 1.21.6' }
          - { platform: 'neoforge_1_21',    display: 'NeoForge 1.21' }
          - { platform: 'forge_1_20_1', display: 'Forge 1.20.1' }
          - { platform: 'forge_1_16_5', display: 'Forge 1.16.5' }

    runs-on: windows-latest
    name: ${{ matrix.display }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10'
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Build ${{ matrix.display }}
        shell: cmd
        run: gradlew -Pplatform=${{ matrix.platform }} :client:${{ matrix.platform }}:build --no-daemon -x check

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: client_${{ matrix.platform }}
          path: '**/build/*.jar'
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, 'debug')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect JARs
        run: |
          mkdir -p release_jars
          find artifacts -name "*.jar" -exec cp {} release_jars/ \;
          ls -la release_jars/

      - name: Create pre-release
        uses: softprops/action-gh-release@v1
        with:
          prerelease: true
          tag_name: ${{ github.ref_name }}
          name: "Pre-release ${{ github.ref_name }}"
          body: |
            Auto-built pre-release

            **Client platforms:**
            - Fabric (1.16.5, 1.20.1, 1.21, 1.21.6, 1.21.11, 26.1)
            - Forge (1.16.5, 1.20.1)
            - NeoForge (1.21, 1.21.6, 1.21.11, 26.1)
          files: release_jars/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
