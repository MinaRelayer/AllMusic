name: AllMusic Server

on:
  push:
    branches: ['dev']
    paths:
      - 'server/**'
      - 'codec/**'
      - '.github/workflows/server.yml'

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: 'velocity', display: 'Velocity' }
          - { platform: 'folia',    display: 'Folia' }
          - { platform: 'spigot',   display: 'Spigot' }
          - { platform: 'paper',    display: 'Paper' }
          - { platform: 'fabric_26_2',    display: 'Fabric 26.2' }
          - { platform: 'fabric_26_1',    display: 'Fabric 26.1' }
          - { platform: 'fabric_1_21_11', display: 'Fabric 1.21.11' }
          - { platform: 'fabric_1_21_6',  display: 'Fabric 1.21.6' }
          - { platform: 'fabric_1_21',    display: 'Fabric 1.21' }
          - { platform: 'fabric_1_20_1',  display: 'Fabric 1.20.1' }
          - { platform: 'fabric_1_16_5',  display: 'Fabric 1.16.5' }
          - { platform: 'neoforge_26_2',    display: 'NeoForge 26.2' }
          - { platform: 'neoforge_26_1',    display: 'NeoForge 26.1' }
          - { platform: 'neoforge_1_21_11', display: 'NeoForge 1.21.11' }
          - { platform: 'neoforge_1_21_6',  display: 'NeoForge 1.21.6' }
          - { platform: 'neoforge_1_21',    display: 'NeoForge 1.21' }
          - { platform: 'forge_1_20_1', display: 'Forge 1.20.1' }
          - { platform: 'forge_1_16_5', display: 'Forge 1.16.5' }
          - { platform: 'forge_1_12_2', display: 'Forge 1.12.2' }
          - { platform: 'forge_1_7_10', display: 'Forge 1.7.10' }
    runs-on: windows-latest
    name: ${{ matrix.display }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Build ${{ matrix.display }}
        shell: cmd
        run: gradlew -Pplatform=${{ matrix.platform }} :server:${{ matrix.platform }}:build --no-daemon --configure-on-demand

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.display }}
          path: build/*.jar
          if-no-files-found: error
